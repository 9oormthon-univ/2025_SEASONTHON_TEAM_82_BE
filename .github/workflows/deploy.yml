name: Deploy to EC2

on:
  push:
    branches: [ release ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag (commit SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-west-2 \
            | docker login --username AWS --password-stdin 590184104064.dkr.ecr.us-west-2.amazonaws.com

      - name: Build & Push image
        run: |
          IMAGE=590184104064.dkr.ecr.us-west-2.amazonaws.com/bridgeon-server
          TAG=${{ steps.meta.outputs.tag }}
          docker build -t $IMAGE:$TAG .
          docker push  $IMAGE:$TAG
          # 필요하면 latest도 함께 push
          # docker tag  $IMAGE:$TAG $IMAGE:latest
          # docker push $IMAGE:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      # 멀티라인 yml을 안전하게 넘기기 위해 base64 인코딩
      - name: Prepare base64 of application ymls
        id: ymlb64
        shell: bash
        run: |
          # -w0: 한 줄로 인코딩 (ubuntu 기본 이미지 지원)
          printf "%s" "${{ secrets.APPLICATION_PROD_YML }}"   | base64 -w0 > prod.b64
          printf "%s" "${{ secrets.APPLICATION_SECRET_YML }}" | base64 -w0 > secret.b64
          echo "prod_b64=$(cat prod.b64)"     >> "$GITHUB_OUTPUT"
          echo "secret_b64=$(cat secret.b64)" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2
        env:
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
          PROD_YML_B64: ${{ steps.ymlb64.outputs.prod_b64 }}
          SECRET_YML_B64: ${{ steps.ymlb64.outputs.secret_b64 }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} << EOF
            set -e
            echo "✅ EC2 접속 성공"

            # awscli 없으면 설치 (Amazon Linux / Ubuntu 둘 다 시도)
            if ! command -v aws >/dev/null 2>&1; then
              (sudo yum -y install awscli || (sudo apt-get update && sudo apt-get -y install awscli)) || true
            fi

            export AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}'
            export AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}'
            export AWS_DEFAULT_REGION='us-west-2'
            export IMAGE_TAG='${IMAGE_TAG}'

            mkdir -p /opt/bridgeon/config
            cd /opt/bridgeon

            # yml 복원 (개행 손상 방지용)
            echo '${PROD_YML_B64}'   | base64 -d > /opt/bridgeon/config/application-prod.yml
            echo '${SECRET_YML_B64}' | base64 -d > /opt/bridgeon/config/application-secret.yml

            echo "[ECR 로그인]"
            aws ecr get-login-password --region \$AWS_DEFAULT_REGION \
              | docker login --username AWS --password-stdin 590184104064.dkr.ecr.\$AWS_DEFAULT_REGION.amazonaws.com

            echo "[이미지 Pull]"
            IMAGE_TAG=\$IMAGE_TAG docker compose pull

            echo "[기존 컨테이너 down]"
            docker compose down || true

            echo "[새 컨테이너 up]"
            IMAGE_TAG=\$IMAGE_TAG docker compose up -d --remove-orphans

            echo "[실행 중 컨테이너]"
            docker ps --format "table {{.Image}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"
          EOF