name: Deploy to EC2

on:
  push:
    branches:
      - release

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-west-2 \
            | docker login --username AWS --password-stdin 590184104064.dkr.ecr.us-west-2.amazonaws.com

      - name: Build & push image
        run: |
          # build & push step
          IMAGE=590184104064.dkr.ecr.us-west-2.amazonaws.com/bridgeon-server
          TAG=${{ steps.meta.outputs.tag }}
          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG
          # 선택: latest도 함께 밀고 싶으면 아래 두 줄 추가
          # docker tag  $IMAGE:$TAG $IMAGE:latest
          # docker push $IMAGE:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Deploy to EC2
        env:
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          echo "[1/6] EC2 접속 시작..."
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            echo "✅ EC2 접속 성공"

            export AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}'
            export AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}'
            export AWS_DEFAULT_REGION='${AWS_DEFAULT_REGION}'
            export IMAGE_TAG='${IMAGE_TAG}'

            cd /opt/bridgeon

            # (중요) yml은 base64로 전달/복원하면 개행이 깨지지 않습니다.
            echo "${APPLICATION_PROD_YML_B64}"   | base64 -d > /opt/bridgeon/config/application-prod.yml
            echo "${APPLICATION_SECRET_YML_B64}" | base64 -d > /opt/bridgeon/config/application-secret.yml

            echo "[3/6] ECR 로그인 & 이미지 Pull..."
            aws ecr get-login-password --region $AWS_DEFAULT_REGION \
              | docker login --username AWS --password-stdin 590184104064.dkr.ecr.us-west-2.amazonaws.com
            IMAGE_TAG=$IMAGE_TAG docker compose pull

            echo "[4/6] 기존 컨테이너 종료..."
            docker compose down

            echo "[5/6] 새 컨테이너 실행..."
            IMAGE_TAG=$IMAGE_TAG docker compose up -d --remove-orphans

            echo "[6/6] 현재 실행 중인 컨테이너:"
            docker ps --format "table {{.Image}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"
          EOF