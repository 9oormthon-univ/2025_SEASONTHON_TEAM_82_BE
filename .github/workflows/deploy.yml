name: Deploy to EC2

on:
  push:
    branches: [ release ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (commit SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-west-2 \
          | docker login --username AWS --password-stdin 590184104064.dkr.ecr.us-west-2.amazonaws.com

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image (linux/amd64)
        env:
          IMAGE: 590184104064.dkr.ecr.us-west-2.amazonaws.com/bridgeon-server
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest \
            --push .

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      # 멀티라인 yml을 안전하게 전달하기 위해 base64로 변환 (런너에서)
      - name: Prepare base64 of application ymls
        id: ymlb64
        shell: bash
        run: |
          printf "%s" "${{ secrets.APPLICATION_PROD_YML }}"   | base64 -w0 > prod.b64
          printf "%s" "${{ secrets.APPLICATION_SECRET_YML }}" | base64 -w0 > secret.b64
          echo "prod_b64=$(cat prod.b64)"     >> "$GITHUB_OUTPUT"
          echo "secret_b64=$(cat secret.b64)" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2
        env:
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
          APP_PROD_B64: ${{ steps.ymlb64.outputs.prod_b64 }}
          APP_SECRET_B64: ${{ steps.ymlb64.outputs.secret_b64 }}
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@${{ secrets.EC2_HOST }} <<EOF
            set -e

            # 런타임에 환경 설정
            export AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}'
            export AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}'
            export AWS_DEFAULT_REGION='${AWS_DEFAULT_REGION}'
            export IMAGE_TAG='${IMAGE_TAG}'

            cd /opt/bridgeon
            mkdir -p /opt/bridgeon/config

            # application yml 복원
            printf '%s' '${APP_PROD_B64}'   | base64 -d > /opt/bridgeon/config/application-prod.yml
            printf '%s' '${APP_SECRET_B64}' | base64 -d > /opt/bridgeon/config/application-secret.yml

            # ECR 로그인 & 정확한 태그 Pull
            aws ecr get-login-password --region ${AWS_DEFAULT_REGION} \
              | docker login --username AWS --password-stdin 590184104064.dkr.ecr.us-west-2.amazonaws.com

            IMAGE_TAG=${IMAGE_TAG} docker compose pull
            docker compose down
            IMAGE_TAG=${IMAGE_TAG} docker compose up -d --remove-orphans

            # 사용 안 하는 이미지 정리 (EC2 로컬)
            docker image prune -af

            # 상태 출력
            docker ps --format "table {{.Image}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"
          EOF