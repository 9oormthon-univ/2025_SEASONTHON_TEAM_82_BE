version: "3.8"

services:
  app:
    image: 590184104064.dkr.ecr.us-west-2.amazonaws.com/bridgeon-server:${IMAGE_TAG}
    container_name: bridgeon-app
    ports:
      - "80:8080"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: prod,secret
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/app/config/
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+ExitOnOutOfMemoryError"
    volumes:
      - /opt/bridgeon/config:/app/config:ro
    restart: always